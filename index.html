<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Intelligence Brief</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0C0F1A;
    --surface:   #141824;
    --border:    rgba(255,255,255,0.10);
    --crypto:    #00E5FF;
    --crypto-d:  #00A8BD;
    --sweep:     #FFB74D;
    --sweep-d:   #CC7A00;
    --high:      #FF5252;
    --medium:    #FFCA28;
    --low:       #69F0AE;
    --text:      #F0F0F8;
    --muted:     #A0A0BC;
    --head-font: 'Syne', sans-serif;
    --body-font: 'Outfit', sans-serif;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    font-family: var(--body-font);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── GRID NOISE OVERLAY ── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(255,255,255,0.013) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.013) 1px, transparent 1px);
    background-size: 48px 48px;
  }


  /* ── LAYOUT ── */
  .shell { position: relative; z-index: 1; max-width: 1280px; margin: 0 auto; padding: 32px 24px 64px; }

  /* ── MASTHEAD ── */
  .masthead {
    display: flex; justify-content: space-between; align-items: flex-end;
    flex-wrap: wrap; gap: 16px; margin-bottom: 32px;
  }
  .masthead-left {}
  .masthead-eyebrow {
    font-size: 11px; letter-spacing: 0.2em; color: var(--muted);
    text-transform: uppercase; margin-bottom: 6px;
  }
  .masthead-title {
    font-family: var(--head-font);
    font-size: clamp(22px, 3.5vw, 34px);
    font-weight: 800; color: #F2F2F2; letter-spacing: -0.01em; line-height: 1;
  }
  .masthead-title span { color: var(--crypto); }
  .masthead-right { text-align: right; }
  .masthead-date {
    font-size: 13px; color: var(--muted); letter-spacing: 0.06em;
  }
  .masthead-meta {
    margin-top: 4px; font-size: 11px; color: var(--muted);
    background: #1A1E2E; border: 1px solid rgba(255,255,255,0.08);
    display: inline-block; padding: 3px 10px; border-radius: 4px;
  }

  .rule { height: 1px; background: linear-gradient(90deg, var(--crypto), var(--sweep), transparent); margin-bottom: 32px; opacity: 0.3; }

  /* ── SUMMARY BAR ── */
  .summary-bar {
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 32px;
  }
  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px; padding: 18px 20px;
    position: relative; overflow: hidden;
  }
  .summary-card::before {
    content: attr(data-sector);
    position: absolute; right: 16px; top: 50%;
    transform: translateY(-50%);
    font-family: var(--head-font); font-size: 56px; font-weight: 800;
    opacity: 0.04; letter-spacing: -2px; color: #fff; pointer-events: none;
  }
  .summary-card.crypto { border-top: 2px solid var(--crypto); }
  .summary-card.sweep  { border-top: 2px solid var(--sweep);  }
  .summary-label {
    font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 8px;
  }
  .summary-card.crypto .summary-label { color: var(--crypto); }
  .summary-card.sweep  .summary-label { color: var(--sweep);  }
  .summary-headline { font-size: 16px; font-weight: 600; color: #F0F0F5; line-height: 1.45; margin-bottom: 8px; }
  .summary-body { font-size: 13px; color: var(--muted); line-height: 1.65; }

  /* ── SECTOR COLUMNS ── */
  .columns { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

  /* ── SECTOR HEADER ── */
  .sector-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px; padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .sector-name {
    font-family: var(--head-font); font-size: 15px; font-weight: 800;
    letter-spacing: 0.1em; text-transform: uppercase;
  }
  .sector-name.crypto { color: var(--crypto); }
  .sector-name.sweep  { color: var(--sweep);  }
  .sector-count { font-size: 11px; color: var(--muted); }

  /* ── EVENT CARD ── */
  .event-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px; margin-bottom: 10px;
    overflow: hidden; cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    animation: fadeUp 0.4s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .event-card:hover { background: rgba(255,255,255,0.04); }
  .event-card.crypto:hover { border-color: rgba(0,229,255,0.25); }
  .event-card.sweep:hover  { border-color: rgba(255,171,64,0.25);  }

  .card-top { display: flex; gap: 0; }
  .card-accent {
    width: 3px; flex-shrink: 0;
  }
  .card-accent.high   { background: var(--high);   }
  .card-accent.medium { background: var(--medium);  }
  .card-accent.low    { background: var(--low);     }

  .card-body { padding: 12px 14px; flex: 1; }

  .card-tags {
    display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; align-items: center;
  }
  .tag {
    font-size: 10px; font-weight: 500; letter-spacing: 0.06em;
    padding: 3px 8px; border-radius: 3px; text-transform: uppercase;
  }
  .tag-market-crypto { color: var(--crypto); background: rgba(0,229,255,0.12); }
  .tag-market-sweep  { color: var(--sweep);  background: rgba(255,183,77,0.12);  }
  .tag-category      { color: #AAAACC; background: rgba(255,255,255,0.08); }
  .tag-impact-High   { color: var(--high);   background: rgba(255,82,82,0.15);   }
  .tag-impact-Medium { color: var(--medium); background: rgba(255,202,40,0.13);  }
  .tag-impact-Low    { color: var(--low);    background: rgba(105,240,174,0.12); }

  .card-meta { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
  .card-title { font-size: 15px; font-weight: 500; color: #EDEDF5; line-height: 1.4; }
  .card-detail {
    display: none; margin-top: 12px; padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .card-detail.open { display: block; }
  .card-detail p { font-size: 14px; color: #B0B0C8; line-height: 1.7; margin-bottom: 10px; }
  .card-detail .impact-label {
    font-size: 13px; font-weight: 500;
    padding: 10px 14px; border-radius: 6px;
    border-left: 3px solid;
    margin-bottom: 10px; line-height: 1.5;
  }
  .card-detail .impact-label.high   { border-color: var(--high);   background: rgba(255,82,82,0.09);   color: #FF8A80; }
  .card-detail .impact-label.medium { border-color: var(--medium); background: rgba(255,202,40,0.09);  color: #FFD54F; }
  .card-detail .impact-label.low    { border-color: var(--low);    background: rgba(105,240,174,0.09); color: #B9F6CA; }
  .card-source { font-size: 11px; color: var(--muted); margin-top: 6px; }

  /* ── KEY PLAYERS TABLE (sweepstakes) ── */
  .players-section { margin-top: 20px; }
  .players-title {
    font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 10px;
  }
  .players-table { width: 100%; border-collapse: collapse; }
  .players-table th {
    font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--muted); text-align: left; padding: 6px 8px;
    border-bottom: 1px solid var(--border);
  }
  .players-table td {
    font-size: 13px; padding: 8px 8px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    color: #C8C8DC;
  }
  .players-table tr:last-child td { border-bottom: none; }
  .trend-up   { color: var(--low);    }
  .trend-down { color: var(--high);   }
  .trend-flat { color: var(--medium); }

  /* ── PIE CHART ── */
  .pie-section { margin-top: 20px; }
  .pie-section .players-title { margin-bottom: 12px; }
  .pie-wrap { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
  .pie-legend { display: flex; flex-direction: column; gap: 5px; }
  .pie-legend-item { display: flex; align-items: center; gap: 7px; }
  .pie-legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .pie-legend-label { font-size: 12px; color: #C8C8DC; }
  .pie-legend-pct { font-size: 11px; color: var(--muted); margin-left: 2px; }

  /* ── EMERGING MARKETS ── */
  .emerging-section { margin-top: 20px; }
  .emerging-title {
    font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 10px;
  }
  .emerging-table { width: 100%; border-collapse: collapse; }
  .emerging-table th {
    font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--muted); text-align: left; padding: 6px 8px;
    border-bottom: 1px solid var(--border);
  }
  .emerging-table td {
    font-size: 12px; padding: 7px 8px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    color: #E8E8F0; vertical-align: top;
  }
  .emerging-table tr:last-child td { border-bottom: none; }
  .status-badge {
    font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 3px;
    text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap;
  }
  .status-Active     { color: var(--low);    background: rgba(105,240,174,0.12); }
  .status-Exploring  { color: var(--medium); background: rgba(255,202,40,0.12);  }
  .status-Restricted { color: var(--high);   background: rgba(255,82,82,0.12);   }
  .status-Banned     { color: #FF5252;       background: rgba(255,82,82,0.18);   }
  .status-Watching   { color: #90CAF9;       background: rgba(144,202,249,0.12); }

  /* ── SLOTS TABLE ── */
  .slots-section { margin-top: 32px; }
  .slots-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px; padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .slots-name {
    font-family: var(--head-font); font-size: 15px; font-weight: 800;
    letter-spacing: 0.1em; text-transform: uppercase; color: #CE93D8;
  }
  .slots-count { font-size: 11px; color: var(--muted); }
  .slots-summary { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 14px; }
  .slots-table { width: 100%; border-collapse: collapse; }
  .slots-table th {
    font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--muted); text-align: left; padding: 6px 10px;
    border-bottom: 1px solid var(--border);
  }
  .slots-table td {
    font-size: 13px; padding: 9px 10px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    color: #E8E8F0; vertical-align: top;
  }
  .slots-table tr:last-child td { border-bottom: none; }
  .slots-table tr.priority-row td:first-child { color: #E1AAFF; font-weight: 500; }
  .slots-table tr:hover td { background: rgba(255,255,255,0.04); }
  .feature-tag {
    display: inline-block; font-size: 10px; padding: 2px 6px; border-radius: 3px;
    background: rgba(206,147,216,0.22); color: #E1AAFF;
    margin: 2px 2px 2px 0; white-space: nowrap;
    border: 1px solid rgba(206,147,216,0.25);
  }
  .priority-star { color: #E1AAFF; margin-right: 4px; font-size: 11px; }

  /* ── WATCHLIST ── */
  .watchlist { margin-top: 20px; }
  .watchlist-title {
    font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 8px;
  }
  .watchlist-item {
    font-size: 13px; color: #9898B8; line-height: 1.55;
    padding: 6px 10px 6px 12px;
    margin-bottom: 4px;
  }
  .watchlist-item.crypto { border-left: 2px solid var(--crypto-d); }
  .watchlist-item.sweep  { border-left: 2px solid var(--sweep-d);  }

  /* ── TANZANITE EMBED ── */
  .tanzanite-section { margin-top: 20px; }
  .tanzanite-title {
    font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 10px;
  }
  .tanzanite-frame-wrap {
    position: relative; width: 100%; border-radius: 8px; overflow: hidden;
    border: 1px solid var(--border); background: var(--surface);
  }
  .tanzanite-fallback {
    display: none; padding: 20px; text-align: center;
  }
  .tanzanite-fallback p { font-size: 13px; color: var(--muted); margin-bottom: 14px; line-height: 1.6; }
  .tanzanite-link {
    display: inline-block; padding: 9px 20px; border-radius: 6px;
    background: rgba(0,229,255,0.1); border: 1px solid rgba(0,229,255,0.25);
    color: var(--crypto); font-size: 13px; font-weight: 500;
    text-decoration: none; letter-spacing: 0.03em;
    transition: background 0.2s;
  }
  .tanzanite-link:hover { background: rgba(0,229,255,0.18); }

  /* ── FOOTER ── */
  .footer {
    margin-top: 48px; text-align: center;
    font-size: 11px; color: var(--muted); letter-spacing: 0.06em;
  }

  /* ── LOADING / ERROR STATES ── */
  .state-box {
    grid-column: 1 / -1; text-align: center;
    padding: 60px 24px; font-size: 13px; color: var(--muted);
  }
  .spinner {
    width: 32px; height: 32px; border-radius: 50%;
    border: 2px solid rgba(0,229,255,0.15);
    border-top-color: var(--crypto);
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── RESPONSIVE ── */
  @media (max-width: 720px) {
    .summary-bar, .columns { grid-template-columns: 1fr; }
  }
</style>
</head>

// ─────────────────────────────────────────────
// RENDER ENGINE
// ─────────────────────────────────────────────

function formatDate(iso) {
  const d = iso ? new Date(iso) : new Date();
  return d.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
}

function impactClass(impact) {
  return (impact||'').toLowerCase();
}

function trendIcon(trend) {
  if (!trend || trend === 'Unknown') return '<span class="trend-flat">? Unknown</span>';
  if (trend === 'Growing')    return '<span class="trend-up">↑ Growing</span>';
  if (trend === 'Contracting') return '<span class="trend-down">↓ Contracting</span>';
  return '<span class="trend-flat">→ Stable</span>';
}

function renderStory(story, sector) {
  const ic = impactClass(story.impact);
  return `
  <div class="event-card ${sector}" onclick="toggleCard(this)">
    <div class="card-top">
      <div class="card-accent ${ic}"></div>
      <div class="card-body">
        <div class="card-tags">
          <span class="tag tag-market-${sector}">${sector === 'crypto' ? '⬡ Crypto iGaming' : '◉ Sweepstakes'}</span>
          <span class="tag tag-category">${story.category || ''}</span>
          <span class="tag tag-impact-${story.impact}">${story.impact} Impact</span>
        </div>
        ${story.customer ? `<div class="card-meta">Customer / Segment: ${story.customer}</div>` : ''}
        <div class="card-title">${story.title}</div>
        <div class="card-detail">
          <p>${story.body}</p>
          ${story.businessImpact ? `<div class="impact-label ${ic}">⚑ Business Impact: ${story.businessImpact}</div>` : ''}
          <div class="card-source">Source: ${story.source || 'Industry Report'}</div>
        </div>
      </div>
    </div>
  </div>`;
}

function renderWatchlist(items, sector) {
  if (!items || !items.length) return '';
  return `
  <div class="watchlist">
    <div class="watchlist-title">⚑ Watch This Week</div>
    ${items.map(w => `<div class="watchlist-item ${sector}">${w}</div>`).join('')}
  </div>`;
}

function renderPieChart(marketShare) {
  if (!marketShare || !marketShare.length) return '';
  const colors = ['#FFB74D','#00E5FF','#69F0AE','#FF5252','#CE93D8','#80DEEA','#FFCC02','#FF8A65','#A5D6A7','#90CAF9'];
  const total = marketShare.reduce((sum, d) => sum + d.sharePercent, 0);
  let angle = -Math.PI / 2;
  const cx = 90, cy = 90, r = 78;
  const slices = marketShare.map((d, i) => {
    const sweep = (d.sharePercent / total) * 2 * Math.PI;
    const mid = angle + sweep / 2;
    const sl = { ...d, start: angle, end: angle + sweep, mid, color: colors[i % colors.length] };
    angle += sweep;
    return sl;
  });
  const paths = slices.map(s => {
    const x1 = cx + r * Math.cos(s.start), y1 = cy + r * Math.sin(s.start);
    const x2 = cx + r * Math.cos(s.end),   y2 = cy + r * Math.sin(s.end);
    const lg = (s.end - s.start) > Math.PI ? 1 : 0;
    return `<path d="M${cx},${cy} L${x1.toFixed(1)},${y1.toFixed(1)} A${r},${r} 0 ${lg},1 ${x2.toFixed(1)},${y2.toFixed(1)} Z" fill="${s.color}" opacity="0.85"/>`;
  }).join('');
  const labels = slices.filter(s => s.sharePercent >= 5).map(s => {
    const lx = cx + (r * 0.65) * Math.cos(s.mid);
    const ly = cy + (r * 0.65) * Math.sin(s.mid);
    return `<text x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" text-anchor="middle" dominant-baseline="middle" fill="#0C0F1A" font-size="11" font-weight="700" font-family="Outfit,sans-serif">${s.sharePercent}%</text>`;
  }).join('');
  const legend = slices.map(s =>
    `<div class="pie-legend-item">
      <div class="pie-legend-dot" style="background:${s.color}"></div>
      <span class="pie-legend-label">${s.operator}<span class="pie-legend-pct"> ${s.sharePercent}%</span></span>
    </div>`
  ).join('');
  return `
  <div class="pie-section">
    <div class="players-title">Market Share Estimate <span style="font-size:10px;color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0">— AI-estimated from web sources, not audited figures</span></div>
    <div class="pie-wrap">
      <svg width="180" height="180" viewBox="0 0 180 180" style="flex-shrink:0">${paths}${labels}</svg>
      <div class="pie-legend">${legend}</div>
    </div>
  </div>`;
}

function renderEmergingMarkets(markets) {
  if (!markets || !markets.length) return '';
  const rows = markets.map(m => `
    <tr>
      <td>${m.market}</td>
      <td><span class="status-badge status-${m.status}">${m.status}</span></td>
      <td style="color:#B8B8D0;font-size:12px">${m.notes}</td>
    </tr>`).join('');
  return `
  <div class="emerging-section">
    <div class="emerging-title">🌐 Emerging Markets</div>
    <table class="emerging-table">
      <thead><tr><th>Market</th><th>Status</th><th>Notes</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function renderSlotsTable(slots) {
  if (!slots || !slots.releases || !slots.releases.length) return '';
  const marketStyle = { '.com': '#00E5FF', 'Sweeps': '#FFB74D', 'Both': '#69F0AE', 'Unknown': '#C8C8DC' };
  const marketBg    = { '.com': 'rgba(0,229,255,0.15)', 'Sweeps': 'rgba(255,183,77,0.18)', 'Both': 'rgba(105,240,174,0.15)', 'Unknown': 'rgba(255,255,255,0.1)' };
  const rows = slots.releases.map(r => {
    const features = (r.features || []).map(f => `<span class="feature-tag">${f}</span>`).join('');
    const star = r.priority ? '<span class="priority-star">★</span>' : '';
    const mkt = r.market || 'Unknown';
    const mktTag = `<span class="status-badge" style="color:${marketStyle[mkt]||'#8A8AA8'};background:${marketBg[mkt]||'rgba(255,255,255,0.05)'}">${mkt}</span>`;
    return `<tr class="${r.priority ? 'priority-row' : ''}">
      <td>${star}${r.title}</td>
      <td>${r.provider}</td>
      <td style="color:#B8B8D0;font-size:12px">${r.launchDate}</td>
      <td>${mktTag}</td>
      <td>${features || '<span style="color:var(--muted)">—</span>'}</td>
    </tr>`;
  }).join('');
  return `
  <div class="slots-section">
    <div class="slots-head">
      <div class="slots-name">🎰 Competitor Slot Releases</div>
      <div class="slots-count">${slots.releases.length} releases · week of ${slots.weekOf || '—'}</div>
    </div>
    ${slots.summary ? `<div class="slots-summary">${slots.summary}</div>` : ''}
    <table class="slots-table">
      <thead><tr><th>Game</th><th>Provider</th><th>Launch Date</th><th>Market</th><th>Key Features</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function renderPlayers(players) {
  if (!players || !players.length) return '';
  const hasParent = players.some(p => p.parent);
  return `
  <div class="players-section">
    <div class="players-title">Key Players — Revenue Snapshot</div>
    <table class="players-table">
      <thead>
        <tr>
          <th>Operator</th>
          ${hasParent ? '<th>Parent Company</th>' : ''}
          <th>Est. Annual Revenue</th>
          <th>Trend</th>
        </tr>
      </thead>
      <tbody>
        ${players.map(p => `
        <tr>
          <td>${p.name}</td>
          ${hasParent ? `<td style="color:var(--muted);font-size:12px">${p.parent || '—'}</td>` : ''}
          <td>${p.revenue || '—'}</td>
          <td>${trendIcon(p.trend)}</td>
        </tr>`).join('')}
      </tbody>
    </table>
  </div>`;
}

function render(data) {
  document.getElementById('dateDisplay').textContent = formatDate(data.generatedAt);

  // Summary cards
  const c = data.crypto || {};
  const s = data.sweepstakes || {};
  document.getElementById('cryptoHeadline').textContent = c.headline || '—';
  document.getElementById('cryptoSummary').textContent  = c.summary  || '';
  document.getElementById('sweepHeadline').textContent  = s.headline || '—';
  document.getElementById('sweepSummary').textContent   = s.summary  || '';

  // Columns
  const cryptoStories = (c.stories || []).map((st, i) => {
    st.style = `animation-delay:${i * 0.07}s`;
    return renderStory(st, 'crypto');
  }).join('');

  const sweepStories = (s.stories || []).map((st, i) => {
    st.style = `animation-delay:${i * 0.07}s`;
    return renderStory(st, 'sweep');
  }).join('');

  document.getElementById('columns').innerHTML = `
    <div>
      <div class="sector-head">
        <div class="sector-name crypto">⬡ Crypto iGaming</div>
        <div class="sector-count">${(c.stories||[]).length} events</div>
      </div>
      ${cryptoStories}
      ${renderWatchlist(c.watchlist, 'crypto')}
      <div class="tanzanite-section">
        <div class="tanzanite-title">📊 Crypto Casino Deposit Volume — Tanzanite</div>
        <div class="tanzanite-frame-wrap" id="tanzaniteWrap">
          <div class="tanzanite-fallback" id="tanzaniteFallback" style="display:block">
            <p>Tanzanite blocks external embedding.<br>View the live crypto casino deposit volume chart directly on their site.</p>
            <a class="tanzanite-link" href="https://www.tanzanite.xyz/centralized/volume" target="_blank" rel="noopener">Open Tanzanite Deposit Volume ↗</a>
          </div>
        </div>
      </div>
    </div>
    <div>
      <div class="sector-head">
        <div class="sector-name sweep">◉ Sweepstakes</div>
        <div class="sector-count">${(s.stories||[]).length} events</div>
      </div>
      ${sweepStories}
      ${renderPlayers(s.keyPlayers)}
      ${renderPieChart(s.marketShare)}
      ${renderEmergingMarkets(s.emergingMarkets)}
      ${renderWatchlist(s.watchlist, 'sweep')}
    </div>
  `;
  document.getElementById('columns').insertAdjacentHTML('afterend', renderSlotsTable(data.slots));
}

function toggleCard(el) {
  const detail = el.querySelector('.card-detail');
  if (detail) detail.classList.toggle('open');
}

// DATA LOADING
// ─────────────────────────────────────────────

async function load() {
  try {
    const res = await fetch(DATA_PATH + '?v=' + Date.now());
    if (!res.ok) throw new Error('no file');
    const data = await res.json();
    render(data);
  } catch {
    // Fall back to demo data so the dashboard always renders
    render(DEMO_DATA);
  }
}

load();
